<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let editIndex = -1;

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  const text = taskInput.value;
  if (!text) return;

  tasks.push({
    text,
    done: false,
    priority: priority.value,
    category: category.value,
    date: dueDate.value
  });

  taskInput.value = "";
  save();
  renderTasks();
}

function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  const searchVal = search.value.toLowerCase();
  const filterVal = filter.value;

  let filtered = tasks.filter(t =>
    t.text.toLowerCase().includes(searchVal)
  );

  if (filterVal === "done")
    filtered = filtered.filter(t => t.done);
  if (filterVal === "pending")
    filtered = filtered.filter(t => !t.done);

  filtered.forEach((t, i) => {
    const div = document.createElement("div");
    div.className = "task " + (t.done ? "done" : "");

    if (editIndex === i) {
      div.innerHTML = `
        <input id="editText" value="${t.text}">
        <input type="date" id="editDate" value="${t.date}">
        
        <select id="editPriority">
          <option ${t.priority==="low"?"selected":""}>low</option>
          <option ${t.priority==="medium"?"selected":""}>medium</option>
          <option ${t.priority==="high"?"selected":""}>high</option>
        </select>

        <select id="editCategory">
          <option ${t.category==="Work"?"selected":""}>Work</option>
          <option ${t.category==="Personal"?"selected":""}>Personal</option>
          <option ${t.category==="Study"?"selected":""}>Study</option>
        </select>

        <button onclick="saveEdit(${i})">💾</button>
        <button onclick="cancelEdit()">❌</button>
      `;
    } else {
      div.innerHTML = `
        <div>
          <b>${t.text}</b><br>
          <small>${t.date || ""} | ${t.category}</small><br>
          <span class="priority-${t.priority}">
            ${t.priority.toUpperCase()}
          </span>
        </div>

        <div>
          <button onclick="toggleTask(${i})">✔</button>
          <button onclick="startEdit(${i})">✏️</button>
          <button onclick="deleteTask(${i})">🗑️</button>
        </div>
      `;
    }

    list.appendChild(div);
  });

  updateProgress();
}

function startEdit(i) {
  editIndex = i;
  renderTasks();
}

function cancelEdit() {
  editIndex = -1;
  renderTasks();
}

function saveEdit(i) {
  tasks[i].text = document.getElementById("editText").value;
  tasks[i].date = document.getElementById("editDate").value;
  tasks[i].priority = document.getElementById("editPriority").value;
  tasks[i].category = document.getElementById("editCategory").value;

  editIndex = -1;
  save();
  renderTasks();
}

function toggleTask(i) {
  tasks[i].done = !tasks[i].done;
  save();
  renderTasks();
}

function deleteTask(i) {
  tasks.splice(i, 1);
  save();
  renderTasks();
}

function toggleMode() {
  document.body.classList.toggle("light");
}

function updateProgress() {
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const percent = total ? (done / total) * 100 : 0;
  document.getElementById("progressBar").style.width = percent + "%";
}

renderTasks();
</script>
